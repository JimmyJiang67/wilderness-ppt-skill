<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilderness PPT Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .editor-font { font-family: 'SF Mono', Monaco, 'Courier New', monospace; }
        /* custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-gray-200 flex h-screen">

<!-- Left Panel: JSON Editor -->
<div class="w-[450px] flex flex-col border-r border-gray-800 bg-[#141414]">
    <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between bg-[#1a1a1a]">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-light-green"></div>
            <span class="font-medium text-sm">编辑 JSON</span>
        </div>
        <div class="flex gap-2">
            <button onclick="loadDemo()" class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 rounded transition">加载示例</button>
            <button onclick="renderPreview()" class="px-3 py-1.5 text-xs bg-[#2D3A2D] hover:bg-[#3D4F3D] text-light-green rounded transition">重新渲染</button>
            <button onclick="exportHTML()" class="px-3 py-1.5 text-xs bg-light-green hover:bg-[#3ecf6e] text-[#2D3A2D] font-medium rounded transition">导出 HTML</button>
        </div>
    </div>
    <textarea id="jsonEditor" class="flex-1 bg-[#0f0f0f] text-gray-300 p-4 text-sm editor-font resize-none focus:outline-none" spellcheck="false" placeholder="在此粘贴或编辑 JSON 剧本..."></textarea>
    <div id="statusBar" class="px-4 py-2 text-xs text-gray-500 border-t border-gray-800">就绪</div>
</div>

<!-- Right Panel: Live Preview -->
<div class="flex-1 flex flex-col relative bg-black">
    <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between bg-[#1a1a1a]">
        <span class="font-medium text-sm">实时预览</span>
        <div class="flex items-center gap-3 text-xs text-gray-400">
            <span>按 F 进入全屏 · ← → 翻页 · Esc 概览</span>
        </div>
    </div>
    <div class="flex-1 relative">
        <iframe id="previewFrame" class="w-full h-full border-0"></iframe>
    </div>
</div>

// ============== Render Engine ==============
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

function renderBadge(badge) {
    if (!badge) return '';
    return `<div class="flex items-center gap-2 mb-5">
        <span class="bg-white/20 px-3 py-1.5 text-xs font-bold">${escapeHtml(badge.prefix)}</span>
        <span class="text-white/50 text-sm tracking-[0.2em]">${escapeHtml(badge.suffix)}</span>
    </div>`;
}

function renderBadgeLight(badge) {
    if (!badge) return '';
    return `<div class="flex items-center gap-2 mb-4">
        <span class="bg-dark-green text-white px-3 py-1.5 text-xs font-bold">${escapeHtml(badge.prefix)}</span>
        <span class="text-gray-500 text-sm tracking-[0.2em]">${escapeHtml(badge.suffix)}</span>
    </div>`;
}

function renderSlide(slide, idx, brand) {
    const type = slide.type;
    const bgClass = slide.bg === 'white' ? 'bg-white' : 'bg-dark-green';
    
    switch (type) {
        case 'cover': {
            return `<section class="slide ${bgClass} relative" data-slide-type="cover" data-slide-index="${idx}">
    <div class="absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2">
        <svg class="circular-text w-80 h-80" viewBox="0 0 200 200">
            <defs><path id="cp${idx}" d="M 100,100 m -75,0 a 75,75 0 1,1 150,0 a 75,75 0 1,1 -150,0"/></defs>
            <text fill="rgba(255,255,255,0.15)" font-size="8" letter-spacing="2">
                <textPath href="#cp${idx}">${escapeHtml(brand)} • ${escapeHtml(brand)} • ${escapeHtml(brand)} • </textPath>
            </text>
        </svg>
    </div>
    <div class="absolute left-16 top-1/2 -translate-y-1/2 w-px h-48 bg-white/20"></div>
    <div class="absolute bottom-24 right-24 text-right">
        <div class="flex items-start gap-6">
            <div class="w-1.5 h-24 bg-light-green mt-2"></div>
            <div class="text-left">
                ${slide.title.map(t => `<h1 class="text-6xl font-bold text-white leading-tight">${escapeHtml(t)}</h1>`).join('')}
            </div>
            <div class="text-left pt-2">
                ${slide.subtitle.map(s => `<div class="text-3xl font-light text-white/70 tracking-wider">${escapeHtml(s)}</div>`).join('')}
            </div>
        </div>
        <p class="text-white/50 mt-8 text-lg">${escapeHtml(slide.description)}</p>
    </div>
    <div class="absolute top-8 right-8 text-white/30 text-sm">${escapeHtml(slide.year || '2026')}</div>
</section>`;
        }
        
        case 'contents': {
            const items = (slide.items || []).map(item => `
            <div class="flex items-start gap-5 group cursor-pointer">
                <div class="w-14 h-14 border-2 border-light-green rounded-xl flex items-center justify-center group-hover:bg-light-green transition-colors">
                    <span class="text-light-green group-hover:text-white font-bold text-xl transition-colors">${escapeHtml(item.number)}</span>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-dark-green font-montserrat">${escapeHtml(item.title)}</h3>
                    <p class="text-gray-500 mt-1">${escapeHtml(item.desc)}</p>
                </div>
            </div>`).join('');
            return `<section class="slide ${bgClass} relative" data-slide-type="contents" data-slide-index="${idx}">
    <div class="slide-content p-16">
        <h2 class="text-7xl font-bold text-dark-green mb-16 font-montserrat">${escapeHtml(slide.title)}</h2>
        <div class="grid grid-cols-2 gap-x-24 gap-y-10">
            ${items}
        </div>
        <div class="absolute bottom-8 left-8 flex items-center">
            <span class="bg-dark-green text-white px-3 py-1.5 text-sm font-bold">${escapeHtml(slide.year || '2026')}</span>
        </div>
    </div>
</section>`;
        }
        
        case 'content-split': {
            let leftHtml = '';
            if (slide.left) {
                const desc = slide.left.description ? `<p class="text-white/70 leading-relaxed mb-6 whitespace-pre-line">${escapeHtml(slide.left.description)}</p>` : '';
                const list = slide.left.list ? `<div class="space-y-3">${slide.left.list.map(li => `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-light-green/20 flex items-center justify-center text-light-green text-sm font-bold">${escapeHtml(li.number)}</div>
                        <span class="text-white/80">${escapeHtml(li.text)}</span>
                    </div>`).join('')}</div>` : '';
                const tags = slide.left.tags ? `<div class="flex gap-3 mt-4">${slide.left.tags.map(t => `<span class="px-6 py-2 border border-white/30 rounded-full text-sm">${escapeHtml(t)}</span>`).join('')}</div>` : '';
                const highlight = slide.left.highlight ? `<div class="p-5 bg-white/5 rounded-2xl border border-white/10 mt-4"><p class="text-white/80 text-sm">${escapeHtml(slide.left.highlight)}</p>${slide.left.subHighlight ? `<p class="text-white/40 text-xs mt-2">${escapeHtml(slide.left.subHighlight)}</p>` : ''}</div>` : '';
                leftHtml = `<div class="text-white">${desc}${list}${tags}${highlight}</div>`;
            }
            
            let rightHtml = '';
            if (slide.rightCard) {
                if (slide.rightCard.grid2x2) {
                    const grid = slide.rightCard.grid2x2.map(cell => `
                        <div class="bg-dark-green/5 rounded-2xl p-5 text-center">
                            <div class="text-3xl mb-2">${escapeHtml(cell.icon)}</div>
                            <div class="text-dark-green font-bold">${escapeHtml(cell.title)}</div>
                            <div class="text-gray-500 text-sm mt-1">${escapeHtml(cell.sub)}</div>
                        </div>`).join('');
                    rightHtml = `<div class="bg-white rounded-[40px] p-10 shadow-2xl">
                        <h3 class="text-xl font-bold text-dark-green mb-6">${escapeHtml(slide.rightCard.title)}</h3>
                        <div class="grid grid-cols-2 gap-4">${grid}</div>
                    </div>`;
                } else if (slide.rightCard.layers) {
                    const layers = slide.rightCard.layers.map((ly, i) => `
                        <div class="bg-dark-green/5 rounded-2xl p-5 border-l-4 ${ly.highlight ? 'border-light-green' : 'border-dark-green'}">
                            <div class="${ly.highlight ? 'text-light-green' : 'text-dark-green'} font-bold text-lg mb-1">${escapeHtml(ly.number)}</div>
                            <div class="text-gray-600 text-sm">${escapeHtml(ly.text)}</div>
                        </div>`).join('');
                    rightHtml = `<div class="bg-white rounded-[40px] p-10 shadow-2xl">
                        <h3 class="text-xl font-bold text-dark-green mb-6">${escapeHtml(slide.rightCard.title)}</h3>
                        <div class="space-y-4">${layers}</div>
                    </div>`;
                } else if (slide.rightCard.mainText) {
                    const main = slide.rightCard.mainText.map((t, i) => {
                        if (t === '→') return `<div class="text-gray-400 text-lg mb-4">→</div>`;
                        const isLast = i === slide.rightCard.mainText.length - 1;
                        return `<div class="text-6xl font-bold ${isLast ? 'text-light-green' : 'text-dark-green'} mb-4 whitespace-pre-line">${escapeHtml(t)}</div>`;
                    }).join('');
                    const divider = slide.rightCard.divider ? `<div class="w-16 h-1 bg-light-green mx-auto mb-4"></div>` : '';
                    const footer = slide.rightCard.footer ? `<div class="mt-6 p-4 bg-dark-green rounded-2xl text-center"><p class="text-white/90 text-sm font-medium">${escapeHtml(slide.rightCard.footer)}</p></div>` : '';
                    rightHtml = `<div class="bg-white rounded-[40px] p-10 shadow-2xl">
                        ${slide.rightCard.badge ? renderBadgeLight(slide.rightCard.badge) : ''}
                        <div class="text-center py-8">${main}${divider}</div>
                        ${footer}
                    </div>`;
                } else {
                    rightHtml = `<div class="bg-white rounded-[40px] p-10 shadow-2xl"><h3 class="text-xl font-bold text-dark-green mb-6">${escapeHtml(slide.rightCard.title || '')}</h3></div>`;
                }
            }
            
            let topHtml = '';
            if (slide.topElements) {
                topHtml = slide.topElements.map(el => {
                    if (el.type === 'cards-row') {
                        const cards = el.cards.map(c => `
                            <div class="col-span-1 bg-white/5 rounded-xl p-4 border border-white/10 text-center flex flex-col justify-center">
                                <div class="text-light-green text-2xl font-bold font-montserrat">${escapeHtml(c.number)}</div>
                                <div class="text-white font-bold text-sm mt-1">${escapeHtml(c.title)}</div>
                                <div class="text-white/40 text-[11px] mt-1">${escapeHtml(c.sub)}</div>
                            </div>`).join('');
                        return `<div class="grid grid-cols-6 gap-4 mb-5 items-stretch">${cards}</div>`;
                    } else if (el.type === 'prompt-bar') {
                        const steps = el.steps.map((s, i) => `
                            <span class="text-white/50 text-xs">${escapeHtml(s)}</span>
                            ${i < el.steps.length - 1 ? '<span class="text-white/20">→</span>' : ''}`).join('');
                        return `<div class="col-span-3 bg-white/5 rounded-xl px-5 py-3 border border-light-green/20 flex items-center justify-center gap-2">
                            <span class="text-light-green text-xs font-bold">${escapeHtml(el.label)}</span>
                            ${steps}
                        </div>`;
                    }
                    return '';
                }).join('');
            }
            
            let imagesHtml = '';
            if (slide.images) {
                const imgs = slide.images.map(img => {
                    if (img.style === 'arrow') {
                        return `<div class="flex items-center justify-center"><div class="text-white/30 text-2xl">→</div></div>`;
                    } else if (img.style === 'placeholder') {
                        return `<div class="image-placeholder rounded-xl bg-white/5 border border-dashed border-white/20 flex items-center justify-center h-[160px] cursor-pointer"><span class="text-white/20 text-xs">+</span></div>`;
                    } else {
                        const borderClass = img.style === 'highlight' ? 'border-2 border-light-green/50' : 'border-2 border-white/10';
                        const labelBg = img.style === 'highlight' ? 'bg-light-green/80' : 'bg-black/70';
                        const labelColor = img.style === 'highlight' ? 'text-dark-green' : 'text-white/70';
                        const boldClass = img.style === 'highlight' ? 'font-bold' : '';
                        return `<div class="rounded-xl overflow-hidden ${borderClass} relative">
                            <img src="${escapeHtml(img.src)}" class="w-full h-[160px] object-cover" onerror="this.style.display='none';this.parentElement.classList.add('bg-white/5');">
                            <div class="absolute bottom-0 left-0 right-0 ${labelBg} px-2 py-1"><span class="${labelColor} text-[10px] ${boldClass}">${escapeHtml(img.label)}</span></div>
                        </div>`;
                    }
                }).join('');
                imagesHtml = `<div class="grid grid-cols-6 gap-3 items-center mt-4" data-img-zone="comparison">${imgs}</div>`;
            }
            
            let footerHtml = '';
            if (slide.footer) {
                footerHtml = `<div class="mt-5 p-4 bg-white/5 rounded-xl border border-light-green/20 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="bg-dark-green text-white px-3 py-1 text-xs font-bold rounded">${escapeHtml(slide.footer.badge)}</span>
                        <span class="text-light-green font-bold text-sm">${escapeHtml(slide.footer.quote)}</span>
                    </div>
                    <div class="text-white/40 text-xs">${escapeHtml(slide.footer.subquote)}</div>
                </div>`;
            }
            
            return `<section class="slide ${bgClass}" data-slide-type="content-split" data-slide-index="${idx}">
    <div class="slide-content p-16">
        ${renderBadge(slide.badge)}
        <h2 class="text-4xl font-bold text-white mb-1 font-montserrat">${escapeHtml(slide.title)}</h2>
        <h3 class="text-lg text-white/60 mb-6">${escapeHtml(slide.subtitle)}</h3>
        ${topHtml}
        ${imagesHtml}
        <div class="grid grid-cols-2 gap-16 h-full items-center mt-4">
            ${leftHtml}
            ${rightHtml}
        </div>
        ${footerHtml}
    </div>
</section>`;
        }
        
        case 'gallery': {
            const imgs = (slide.images || []).map(img => {
                const borderClass = img.style === 'highlight' ? 'border-2 border-light-green/50' : 'border-2 border-white/10';
                const labelBg = img.style === 'highlight' ? 'bg-light-green/80' : 'bg-black/60';
                const labelColor = img.style === 'highlight' ? 'text-dark-green' : 'text-white/80';
                const boldClass = img.style === 'highlight' ? 'font-bold' : '';
                return `<div class="col-span-1 rounded-2xl overflow-hidden relative ${borderClass}">
                    <img src="${escapeHtml(img.src)}" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    <div class="absolute bottom-0 left-0 right-0 ${labelBg} px-3 py-2"><span class="${labelColor} text-xs ${boldClass}">${escapeHtml(img.label)}</span></div>
                </div>`;
            }).join('');
            const caption = slide.caption ? `<div class="mt-4 flex items-center justify-center gap-8">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-white/30"></div><span class="text-white/50 text-sm">${escapeHtml(slide.caption.left)}</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-light-green"></div><span class="text-white/50 text-sm">${escapeHtml(slide.caption.right)}</span></div>
            </div>` : '';
            return `<section class="slide ${bgClass}" data-slide-type="gallery" data-slide-index="${idx}">
    <div class="slide-content p-16">
        ${renderBadge(slide.badge)}
        <h2 class="text-3xl font-bold text-white font-montserrat mb-1">${escapeHtml(slide.title)}</h2>
        <h3 class="text-lg text-white/60 mb-6">${escapeHtml(slide.subtitle)}</h3>
        <div class="grid grid-cols-4 gap-4 flex-1">${imgs}</div>
        ${caption}
    </div>
</section>`;
        }
        
        case 'case': {
            const cases = (slide.cases || []).map(c => `
            <div class="space-y-4">
                <div class="text-white/80 font-medium mb-4">${escapeHtml(c.title)}</div>
                <div class="bg-black/30 rounded-2xl overflow-hidden">
                    <div class="grid grid-cols-2">
                        <div class="p-5 bg-white/5">
                            <div class="text-white/50 text-sm mb-2">${escapeHtml(c.before.label)}</div>
                            <div class="text-white/80 text-sm">${escapeHtml(c.before.text)}</div>
                            <div class="text-white/40 text-xs mt-2">${escapeHtml(c.before.sub)}</div>
                        </div>
                        <div class="p-5 bg-light-green/20">
                            <div class="text-light-green text-sm mb-2">${escapeHtml(c.after.label)}</div>
                            <div class="text-white text-sm font-medium">${escapeHtml(c.after.text)}</div>
                            <div class="text-white/70 text-xs mt-2">${escapeHtml(c.after.sub)}</div>
                        </div>
                    </div>
                </div>
            </div>`).join('');
            const quote = slide.quote ? `<div class="mt-8 text-center"><div class="inline-block bg-dark-green/50 rounded-full px-8 py-3"><span class="text-light-green font-bold">${escapeHtml(slide.quote)}</span></div></div>` : '';
            return `<section class="slide ${bgClass} relative" data-slide-type="case" data-slide-index="${idx}">
    <div class="bg-white rounded-b-[40px] p-10 mx-16">
        ${renderBadgeLight(slide.badge)}
        <h2 class="text-3xl font-bold text-dark-green font-montserrat">${escapeHtml(slide.title)}</h2>
        <h3 class="text-xl text-gray-700 mt-2">${escapeHtml(slide.subtitle)}</h3>
    </div>
    <div class="p-16">
        <div class="grid grid-cols-3 gap-6">${cases}</div>
        ${quote}
    </div>
</section>`;
        }
        
        case 'data': {
            const items = (slide.items || []).map(item => `
            <div class="bg-white/5 rounded-2xl p-6 border ${item.highlight ? 'border-light-green/30' : 'border-white/10'}">
                <div class="text-5xl font-bold text-light-green font-montserrat mb-2">${escapeHtml(item.value)}</div>
                <div class="text-white font-bold mb-1">${escapeHtml(item.title)}</div>
                <div class="text-white/50 text-sm">${escapeHtml(item.desc)}</div>
            </div>`).join('');
            const watermark = slide.watermark ? `<div class="absolute bottom-0 right-0 text-[180px] font-bold text-white/5 leading-none font-montserrat select-none">${escapeHtml(slide.watermark)}</div>` : '';
            return `<section class="slide ${bgClass} relative overflow-hidden" data-slide-type="data" data-slide-index="${idx}">
    ${watermark}
    <div class="slide-content relative z-10 p-16">
        ${renderBadge(slide.badge)}
        <h2 class="text-4xl font-bold text-white mb-2 font-montserrat">${escapeHtml(slide.title)}</h2>
        <h3 class="text-2xl text-white/80 mb-10">${escapeHtml(slide.subtitle)}</h3>
        <div class="grid grid-cols-4 gap-6">${items}</div>
    </div>
</section>`;
        }
        
        case 'quote': {
            const tags = (slide.tags || []).map(t => `<span class="px-8 py-3 border border-white/40 rounded-full text-sm">${escapeHtml(t)}</span>`).join('');
            return `<section class="slide ${bgClass} relative overflow-hidden" data-slide-type="quote" data-slide-index="${idx}">
    <div class="absolute top-1/2 left-1/4 -translate-x-1/2 -translate-y-1/2">
        <svg class="w-72 h-72" viewBox="0 0 200 200">
            <defs><path id="cp${idx}" d="M 100,100 m -85,0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"/></defs>
            <text fill="rgba(255,255,255,0.08)" font-size="9" letter-spacing="3">
                <textPath href="#cp${idx}">AIGC • ${escapeHtml(brand)} • AIGC • ${escapeHtml(brand)} • </textPath>
            </text>
        </svg>
    </div>
    <div class="slide-content relative z-10 p-16 flex flex-col justify-center items-center text-center">
        <div class="w-16 h-1 bg-light-green mb-12"></div>
        <h2 class="text-5xl font-bold text-white leading-tight mb-6 max-w-3xl">${escapeHtml(slide.title)}<br><span class="text-light-green">${escapeHtml(slide.highlightTitle)}</span></h2>
        <p class="text-white/50 text-lg max-w-xl mb-12 whitespace-pre-line">${escapeHtml(slide.description)}</p>
        <div class="flex gap-6">${tags}</div>
        <div class="absolute bottom-8 right-8 text-white/30 text-sm">${escapeHtml(slide.footer)}</div>
    </div>
</section>`;
        }
        
        default:
            return `<section class="slide ${bgClass}" data-slide-type="${type}" data-slide-index="${idx}"><div class="slide-content p-16"><h2 class="text-white">Unknown slide type: ${type}</h2></div></section>`;
    }
}

function buildHTML(data) {
    const brand = data.meta?.brand || 'WILDERNESS MEDIA';
    const title = data.meta?.title || 'Wilderness PPT';
    const slidesHtml = (data.slides || []).map((slide, idx) => renderSlide(slide, idx, brand)).join('\n');
    
    return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeHtml(title)}</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'dark-green': '#2D3A2D',
                    'forest-green': '#3D4F3D',
                    'light-green': '#4ADE80',
                    'fluorescent-green': '#22C55E',
                },
                fontFamily: {
                    'montserrat': ['Montserrat', 'sans-serif'],
                    'noto': ['Noto Sans SC', 'sans-serif'],
                }
            }
        }
    }
    <\/script>
    <style>
    html, body { height: 100%; overflow-x: hidden; margin: 0; padding: 0; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
    .slide {
        width: 100vw; height: 100vh; height: 100dvh;
        overflow: hidden; scroll-snap-align: start;
        display: flex; flex-direction: column; position: relative; box-sizing: border-box;
    }
    .slide-content {
        flex: 1; display: flex; flex-direction: column; justify-content: center;
        max-height: 100%; overflow: hidden;
    }
    :root {
        --title-size: clamp(2rem, 4vw, 3.5rem);
        --h2-size: clamp(1.5rem, 3vw, 2.5rem);
        --h3-size: clamp(1.25rem, 2vw, 1.75rem);
        --body-size: clamp(0.875rem, 1.5vw, 1.125rem);
        --slide-padding: clamp(1.5rem, 4vw, 4rem);
        --data-size: clamp(2.5rem, 5vw, 4rem);
    }
    .progress-bar {
        position: fixed; top: 0; left: 0; height: 3px;
        background: #4ADE80; z-index: 1000; transition: width 0.3s ease;
    }
    .page-indicator {
        position: fixed; bottom: 24px; right: 32px;
        font-family: 'Montserrat', sans-serif; font-size: 12px;
        color: rgba(255,255,255,0.4); z-index: 900; pointer-events: none;
    }
    .page-indicator.on-light { color: rgba(0,0,0,0.3); }
    .nav-dots {
        position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 8px; z-index: 900;
    }
    .nav-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s;
    }
    .nav-dot.active { background: #4ADE80; transform: scale(1.4); }
    .nav-dot.on-light { background: rgba(0,0,0,0.2); }
    .nav-dot.on-light.active { background: #2D3A2D; }
    body.overview-mode { scroll-snap-type: none !important; scroll-behavior: auto !important; }
    body.overview-mode .slide { height: auto; min-height: auto; overflow: visible; scroll-snap-align: none; border-bottom: 4px solid rgba(0,0,0,0.1); }
    body.overview-mode .slide:hover { outline: 3px solid #4ADE80; outline-offset: -3px; cursor: pointer; }
    .circular-text { animation: rotate 60s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    body { font-family: 'Noto Sans SC', sans-serif; background: #1a1a1a; }
    @media (max-height: 700px) { .slide { padding: 24px !important; } }
    @media (max-height: 600px) { .keyboard-hint { display: none; } .nav-dots { display: none; } }
    @media (max-width: 600px) {
        .nav-dots { display: none; }
        .slide .grid { grid-template-columns: 1fr !important; }
    }
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
        html { scroll-behavior: auto; }
        .circular-text { animation: none; }
    }
    <\/style>
</head>
<body>
<div class="progress-bar" id="progressBar" style="width: 0%"></div>
<nav class="nav-dots" id="navDots"></nav>
<div class="page-indicator" id="pageIndicator">1 / 10</div>
<div class="keyboard-hint" id="keyboardHint">← → 翻页 · F 全屏 · P 演讲者 · Esc 概览</div>
${slidesHtml}
<script>
(function() {
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    let currentSlide = 0;
    function goToSlide(index) {
        if (index < 0 || index >= totalSlides) return;
        currentSlide = index;
        slides[index].scrollIntoView({ behavior: 'smooth' });
        updateUI();
    }
    function nextSlide() { if (currentSlide < totalSlides - 1) goToSlide(currentSlide + 1); }
    function prevSlide() { if (currentSlide > 0) goToSlide(currentSlide - 1); }
    function updateUI() {
        const p = ((currentSlide + 1) / totalSlides) * 100;
        document.getElementById('progressBar').style.width = p + '%';
        const ind = document.getElementById('pageIndicator');
        ind.textContent = (currentSlide + 1) + ' / ' + totalSlides;
        const s = slides[currentSlide];
        const isLight = s.classList.contains('bg-white');
        ind.className = 'page-indicator' + (isLight ? ' on-light' : '');
        document.querySelectorAll('.nav-dot').forEach((d, i) => {
            d.classList.toggle('active', i === currentSlide);
            if (isLight && i === currentSlide) d.classList.add('on-light');
            else d.classList.remove('on-light');
        });
    }
    function createNavDots() {
        const c = document.getElementById('navDots');
        slides.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'nav-dot';
            d.addEventListener('click', () => goToSlide(i));
            c.appendChild(d);
        });
    }
    function setupIO() {
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { currentSlide = parseInt(e.target.dataset.slideIndex); updateUI(); } });
        }, { threshold: 0.6 });
        slides.forEach(s => obs.observe(s));
    }
    document.addEventListener('keydown', e => {
        switch(e.key) {
            case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown': e.preventDefault(); nextSlide(); break;
            case 'ArrowLeft': case 'ArrowUp': case 'PageUp': case 'Backspace': e.preventDefault(); prevSlide(); break;
            case 'f': case 'F': if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); break;
            case 'Escape': document.body.classList.toggle('overview-mode'); break;
        }
    });
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - touchStartX; if (Math.abs(dx) > 50) { dx < 0 ? nextSlide() : prevSlide(); } });
    createNavDots(); setupIO(); updateUI();
    setTimeout(() => { const h = document.getElementById('keyboardHint'); h.classList.add('show'); setTimeout(() => h.classList.remove('show'), 4000); }, 500);
})();
<\/script>
</body>
</html>`;
}

// ============== UI Interactions ==============
function updateStatus(msg, isError=false) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'px-4 py-2 text-xs border-t border-gray-800 ' + (isError ? 'text-red-400' : 'text-gray-500');
}

function renderPreview() {
    const raw = document.getElementById('jsonEditor').value;
    let data;
    try {
        data = JSON.parse(raw);
    } catch (e) {
        updateStatus('JSON 解析错误: ' + e.message, true);
        return;
    }
    const html = buildHTML(data);
    const iframe = document.getElementById('previewFrame');
    iframe.srcdoc = html;
    updateStatus(`已渲染 ${(data.slides || []).length} 页 · ${new Date().toLocaleTimeString()}`);
}

function exportHTML() {
    const raw = document.getElementById('jsonEditor').value;
    let data;
    try {
        data = JSON.parse(raw);
    } catch (e) {
        updateStatus('导出失败: ' + e.message, true);
        return;
    }
    const html = buildHTML(data);
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (data.meta?.title || 'presentation') + '.html';
    a.click();
    URL.revokeObjectURL(url);
    updateStatus('HTML 已导出');
}

function loadDemo() {
    document.getElementById('jsonEditor').value = JSON.stringify(DEFAULT_JSON, null, 2);
    renderPreview();
    updateStatus('已加载示例');
}

// ============== Init ==============
document.addEventListener('DOMContentLoaded', () => {
    loadDemo();
});
</script>
</body>
</html>
